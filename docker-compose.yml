# 部署命令: docker-compose --env-file .env.production up -d --build
services:
  django:
    restart: unless-stopped
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    restart: unless-stopped
    build: .
    command: celery -A config worker -l info --concurrency=2 --max-tasks-per-child=100
    volumes:
      - media_data:/app/media
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    restart: unless-stopped
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - django

  db:
    restart: unless-stopped
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-data_platform}
      POSTGRES_USER: ${DB_USER:-data_platform_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-data_platform_user}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
